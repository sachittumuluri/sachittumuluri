<svg width="960" height="180" viewBox="0 0 960 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sachit Tumuluri — markets, heartbeats, music">
  <defs>
    <style>
      text { font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace; }
      .name {
        font-size: 44px; font-weight: 700; letter-spacing: 7px; fill: #e6e0d2;
        opacity: 0;
        animation: settle 1.4s cubic-bezier(0.2, 0.7, 0.2, 1) 0.2s forwards;
      }
      @keyframes settle {
        from { letter-spacing: 18px; opacity: 0; }
        to   { letter-spacing: 7px;  opacity: 1; }
      }
      .ghost { font-size: 44px; font-weight: 700; letter-spacing: 7px; opacity: 0; }
      .g1 { fill: #ff5e6c; animation: jg1 7s steps(1) 2s infinite; }
      .g2 { fill: #ffb454; animation: jg2 7s steps(1) 2s infinite; }
      @keyframes jg1 {
        0%, 94% { opacity: 0; transform: none; }
        94.5%   { opacity: 0.7; transform: translate(-3px, 1px); }
        95.5%   { opacity: 0; transform: none; }
        96%     { opacity: 0.5; transform: translate(2px, -1px); }
        96.5%, 100% { opacity: 0; transform: none; }
      }
      @keyframes jg2 {
        0%, 94% { opacity: 0; transform: none; }
        94.5%   { opacity: 0.6; transform: translate(3px, -1px); }
        95.5%   { opacity: 0; transform: none; }
        96%     { opacity: 0.4; transform: translate(-2px, 1px); }
        96.5%, 100% { opacity: 0; transform: none; }
      }
      .main { animation: jmain 7s steps(1) 2s infinite; }
      @keyframes jmain {
        0%, 94% { transform: none; }
        94.5%   { transform: translate(1px, 0); }
        95.5%   { transform: none; }
        96%     { transform: translate(-1px, 0); }
        96.5%, 100% { transform: none; }
      }
      .cur { fill: #ffb454; opacity: 0; animation: curin 0.3s ease 1.5s forwards, blink 1.1s steps(1) 1.8s infinite; }
      @keyframes curin { to { opacity: 1; } }
      @keyframes blink { 50% { opacity: 0; } }
      .sub {
        font-size: 12.5px; letter-spacing: 4px; fill: #6a6357;
        opacity: 0; animation: fade 1s ease 1.6s forwards;
      }
      @keyframes fade { to { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .name, .sub { animation: none; opacity: 1; }
        .cur { animation: none; opacity: 1; }
        .g1, .g2, .main { animation: none; }
      }
    </style>
  </defs>

  <rect width="960" height="180" fill="#060607"/>
  <rect x="0.5" y="0.5" width="959" height="179" fill="none" stroke="#1d1b18"/>

  <g class="main">
    <text x="480" y="95" text-anchor="middle" class="ghost g1">SACHIT TUMULURI</text>
    <text x="480" y="95" text-anchor="middle" class="ghost g2">SACHIT TUMULURI</text>
    <text x="480" y="95" text-anchor="middle" class="name">SACHIT TUMULURI</text>
  </g>
  <rect class="cur" x="748" y="88" width="22" height="6"/>

  <text x="480" y="134" text-anchor="middle" class="sub">markets · heartbeats · music</text>
</svg>

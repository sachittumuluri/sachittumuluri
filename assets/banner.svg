<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sachit Tumuluri — machine learning, quantitative research, full-stack builds">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070b18"/>
      <stop offset="0.55" stop-color="#0c1226"/>
      <stop offset="1" stop-color="#101a36"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b7bff"/>
      <stop offset="0.5" stop-color="#4dd8ff"/>
      <stop offset="1" stop-color="#ff5ea8"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.6 0; 0.6 0; -0.6 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono { font: 500 13px "SFMono-Regular", "Cascadia Code", Consolas, "Liberation Mono", Menlo, monospace; }
      .name {
        font: 800 58px -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        letter-spacing: 7px;
        fill: url(#ink);
        stroke: url(#ink);
        stroke-width: 1.1;
        fill-opacity: 0;
        stroke-dasharray: 1400;
        stroke-dashoffset: 1400;
        animation: draw 2.6s ease-out forwards, fillin 1.4s ease 1.8s forwards;
      }
      @keyframes draw   { to { stroke-dashoffset: 0; } }
      @keyframes fillin { to { fill-opacity: 1; } }
      .rule {
        stroke: url(#ink); stroke-width: 2.5; stroke-linecap: round;
        stroke-dasharray: 560; stroke-dashoffset: 560;
        animation: draw 1.6s ease 2.2s forwards;
      }
      .role { font: 600 16px "SFMono-Regular", "Cascadia Code", Consolas, Menlo, monospace; letter-spacing: 2.5px; fill: #9fb2e8; opacity: 0; }
      .r1 { animation: cycle 12s linear 3.0s infinite; }
      .r2 { animation: cycle 12s linear 7.0s infinite; }
      .r3 { animation: cycle 12s linear 11.0s infinite; }
      @keyframes cycle {
        0% { opacity: 0; transform: translateY(6px); }
        4% { opacity: 1; transform: translateY(0); }
        30% { opacity: 1; transform: translateY(0); }
        34% { opacity: 0; transform: translateY(-6px); }
        100% { opacity: 0; }
      }
      .cursor { fill: #4dd8ff; animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .star { fill: #cfe2ff; animation: twinkle 4s ease-in-out infinite; }
      @keyframes twinkle { 0%,100% { opacity: 0.15; } 50% { opacity: 0.75; } }
      .ekg-hot {
        stroke: #4dd8ff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;
        stroke-dasharray: 90 1400;
        animation: run 6s linear infinite;
        filter: url(#glow);
      }
      @keyframes run { from { stroke-dashoffset: 1490; } to { stroke-dashoffset: 90; } }
      .bar { fill: url(#ink); opacity: 0.85; transform-origin: center 78px; transform-box: view-box; }
      .b1 { animation: eq 1.0s ease-in-out infinite alternate; }
      .b2 { animation: eq 0.8s ease-in-out 0.15s infinite alternate; }
      .b3 { animation: eq 1.2s ease-in-out 0.05s infinite alternate; }
      .b4 { animation: eq 0.7s ease-in-out 0.25s infinite alternate; }
      .b5 { animation: eq 1.1s ease-in-out 0.1s infinite alternate; }
      @keyframes eq { from { transform: scaleY(0.25); } to { transform: scaleY(1); } }
      .sweep { animation: sweep 7s ease-in-out infinite; }
      @keyframes sweep { 0% { transform: translateX(-960px); } 55%,100% { transform: translateX(960px); } }
      @media (prefers-reduced-motion: reduce) {
        .name { animation: none; fill-opacity: 1; stroke-dashoffset: 0; }
        .rule { animation: none; stroke-dashoffset: 0; }
        .r1 { animation: none; opacity: 1; }
        .r2, .r3, .cursor, .sweep { animation: none; }
        .star, .ekg-hot, .bar { animation: none; }
      }
    </style>
  </defs>

  <rect width="960" height="260" rx="18" fill="url(#bg)"/>
  <rect width="960" height="260" rx="18" fill="none" stroke="#2a3a66" stroke-opacity="0.6"/>

  <!-- terminal chrome -->
  <circle cx="30" cy="28" r="5.5" fill="#ff5f57"/>
  <circle cx="50" cy="28" r="5.5" fill="#febc2e"/>
  <circle cx="70" cy="28" r="5.5" fill="#28c840"/>
  <text x="480" y="33" text-anchor="middle" class="mono" fill="#5d6f9e">~/sachit — signal deck</text>

  <!-- stars -->
  <circle class="star" cx="120" cy="70" r="1.6" style="animation-delay:0s"/>
  <circle class="star" cx="250" cy="45" r="1.2" style="animation-delay:1.2s"/>
  <circle class="star" cx="705" cy="52" r="1.5" style="animation-delay:0.6s"/>
  <circle class="star" cx="860" cy="90" r="1.3" style="animation-delay:2.1s"/>
  <circle class="star" cx="910" cy="170" r="1.6" style="animation-delay:1.6s"/>
  <circle class="star" cx="60" cy="180" r="1.3" style="animation-delay:2.8s"/>
  <circle class="star" cx="180" cy="215" r="1.2" style="animation-delay:0.9s"/>
  <circle class="star" cx="795" cy="215" r="1.4" style="animation-delay:2.4s"/>

  <!-- equalizer, top right -->
  <g>
    <rect class="bar b1" x="856" y="52" width="6" height="26" rx="2"/>
    <rect class="bar b2" x="868" y="52" width="6" height="26" rx="2"/>
    <rect class="bar b3" x="880" y="52" width="6" height="26" rx="2"/>
    <rect class="bar b4" x="892" y="52" width="6" height="26" rx="2"/>
    <rect class="bar b5" x="904" y="52" width="6" height="26" rx="2"/>
  </g>

  <!-- name -->
  <text x="480" y="132" text-anchor="middle" class="name">SACHIT TUMULURI</text>
  <line class="rule" x1="200" y1="156" x2="760" y2="156"/>

  <!-- rotating roles -->
  <g>
    <text x="470" y="192" text-anchor="middle" class="role r1">machine learning × quantitative research</text>
    <text x="470" y="192" text-anchor="middle" class="role r2">building ai agents that earn their keep</text>
    <text x="470" y="192" text-anchor="middle" class="role r3">software with a pulse — from ecg to audio</text>
  </g>
  <rect class="cursor" x="792" y="180" width="9" height="16" rx="1.5"/>

  <!-- ekg trace -->
  <path d="M0 232 H240 l14 0 8 -16 10 34 12 -52 10 44 8 -10 h18 H430 l12 0 8 -14 10 30 12 -46 10 38 8 -8 h16 H700 l10 0 8 -12 10 26 12 -40 10 34 8 -8 h14 H960"
        stroke="#22335f" stroke-width="1.6" fill="none" stroke-linejoin="round"/>
  <path class="ekg-hot" d="M0 232 H240 l14 0 8 -16 10 34 12 -52 10 44 8 -10 h18 H430 l12 0 8 -14 10 30 12 -46 10 38 8 -8 h16 H700 l10 0 8 -12 10 26 12 -40 10 34 8 -8 h14 H960"/>

  <!-- sheen sweep -->
  <g class="sweep"><rect x="0" y="0" width="960" height="260" fill="url(#sheen)"/></g>
</svg>

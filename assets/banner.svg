<svg width="960" height="200" viewBox="0 0 960 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sachit Tumuluri — markets, heartbeats, music: it's all signals">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd27d"/>
      <stop offset="0.5" stop-color="#ff9f45"/>
      <stop offset="1" stop-color="#ff5e6c"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.6 0; 0.6 0; -0.6 0" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <style>
      .name {
        font: 700 52px ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
        letter-spacing: 6px;
        fill: url(#ink);
        stroke: url(#ink);
        stroke-width: 1;
        fill-opacity: 0;
        stroke-dasharray: 1400;
        stroke-dashoffset: 1400;
        animation: draw 2.4s ease-out forwards, fillin 1.2s ease 1.7s forwards;
      }
      @keyframes draw   { to { stroke-dashoffset: 0; } }
      @keyframes fillin { to { fill-opacity: 1; } }
      .rule {
        stroke: #3a2f22; stroke-width: 1.5; stroke-linecap: round;
        stroke-dasharray: 520; stroke-dashoffset: 520;
        animation: draw 1.4s ease 2s forwards;
      }
      .sub {
        font: 500 15px ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
        letter-spacing: 3px; fill: #8f8371; opacity: 0;
        animation: fade 1s ease 2.4s forwards;
      }
      @keyframes fade { to { opacity: 1; } }
      .ekg {
        stroke: #ffb454; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round;
        stroke-dasharray: 80 1400;
        animation: run 7s linear infinite;
      }
      @keyframes run { from { stroke-dashoffset: 1480; } to { stroke-dashoffset: 80; } }
      @media (prefers-reduced-motion: reduce) {
        .name { animation: none; fill-opacity: 1; stroke-dashoffset: 0; }
        .rule { animation: none; stroke-dashoffset: 0; }
        .sub  { animation: none; opacity: 1; }
        .ekg  { animation: none; }
      }
    </style>
  </defs>

  <rect width="960" height="200" rx="16" fill="#0b0b0f"/>
  <rect x="0.5" y="0.5" width="959" height="199" rx="15.5" fill="none" stroke="#26221c"/>

  <text x="480" y="96" text-anchor="middle" class="name">SACHIT TUMULURI</text>
  <line class="rule" x1="220" y1="118" x2="740" y2="118"/>
  <text x="480" y="150" text-anchor="middle" class="sub">markets · heartbeats · music — it's all signals</text>

  <path d="M0 178 H310 l10 0 7 -13 9 27 10 -41 9 34 7 -7 h14 H560 l10 0 7 -11 9 24 10 -37 9 30 7 -6 h14 H960"
        stroke="#2c251b" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
  <path class="ekg" d="M0 178 H310 l10 0 7 -13 9 27 10 -41 9 34 7 -7 h14 H560 l10 0 7 -11 9 24 10 -37 9 30 7 -6 h14 H960"/>
</svg>
